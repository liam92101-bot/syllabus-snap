name: Uptime check

on:
  schedule:
    # 13:30 UTC = 6:30am PDT — daily, just after Luna's CI run
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Waitlist page is up and intact
        run: |
          set -e
          body=$(curl -sf --max-time 30 https://liam92101-bot.github.io/syllabus-snap/)
          echo "$body" | grep -q "Syllabus Snap" || {
            echo "Page loaded but expected content is missing"; exit 1; }
          echo "Page OK"

      - name: Formspree endpoint still exists
        run: |
          # A live Formspree form answers GET with 405 (POST-only); a deleted form 404s.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://formspree.io/f/mkolpkdw)
          echo "Formspree responded $code"
          [ "$code" != "404" ] || { echo "Form was deleted or disabled"; exit 1; }
